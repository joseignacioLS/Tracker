<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker de Combate</title>
    <link rel="stylesheet" href="styles.css">
    <script src="main.js" defer></script>
</head>

<body>
    <header>
        <h1>⚔ Tracker de Combate</h1>
        <div class="toolbar">
            <div>
                <button class="btn-pc" onclick="add('pc')">➕ PJ</button>
                <button class="btn-npc" onclick="add('npc')">➕ NPC</button>
                <button class="btn-enemy" onclick="add('enemy')">➕ Enemigo</button>
            </div>
        </div>

        <div style="text-align:center">
            Ronda:
            <input id="round" type="number" style="width:70px;text-align:center" onchange="save()">
            <button class="btn-next" onclick="nextTurn()">⏭ Turno</button>
        </div>

    </header>
    <main>
        <table>
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Info</th>
                </tr>
            </thead>
            <tbody id="body"></tbody>
        </table>
        <div class="wrapper-reset">
            <button class="btn-reset" onclick="resetAll()">🗑 Reset</button>
        </div>
    </main>
</body>

</html>
