<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracker de Combate</title>

<style>

:root{
    --bg:#1b1b1b;
    --panel:#2a2a2a;
    --text:#fff;
    --gold:#d4af37;
}

body{
    margin:0;
    padding:20px;
    background:var(--bg);
    color:var(--text);
    font-family:Segoe UI, Arial, sans-serif;
    font-size:18px;
}

body.big{ font-size:24px; }

h1{ text-align:center; }

.toolbar{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:10px;
}

button{
    border:none;
    padding:10px 14px;
    border-radius:8px;
    cursor:pointer;
}

.btn-pc{background:#234f8c;color:white;}
.btn-npc{background:#2f6f45;color:white;}
.btn-enemy{background:#8b2f2f;color:white;}
.btn-next{background:#1565c0;color:white;}
.btn-reset{background:#b71c1c;color:white;}
.btn-ui{background:#444;color:white;}

table{
    width:100%;
    border-collapse:collapse;
    background:var(--panel);
}

th{
    background:#111;
    padding:12px;
    text-align:left;
}

td{
    padding:10px;
    border-top:1px solid #444;
}

.pc{background:#234f8c;}
.npc{background:#2f6f45;}
.enemy{background:#8b2f2f;}

.active{
    outline:6px solid var(--gold);
    outline-offset:-3px;
    box-shadow:0 0 15px rgba(212,175,55,.8);
}

/* inputs */
.edit{
    background:transparent;
    border:none;
    color:white;
    font-size:inherit;
    outline:none;
    text-align:center;
}

/* layout PC */
.info{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
}

.leftInfo{
    display:flex;
    gap:10px;
    align-items:center;
    flex-wrap:wrap;
}

.rightInfo{
    margin-left:auto;
    font-weight:bold;
}

.hpbar{
    height:6px;
    width:70px;
    background:#333;
    border-radius:4px;
    overflow:hidden;
}

.hpfill{
    height:100%;
    background:#3ddc6b;
}

.deleteBtn{
    margin-left:10px;
    background:#b71c1c;
    color:white;
    border:none;
    padding:4px 8px;
    border-radius:6px;
    cursor:pointer;
}

.cond{
    background:#555;
    padding:2px 6px;
    border-radius:6px;
    font-size:0.8em;
    cursor:pointer;
}

/* 🔥 MOBILE: modo tarjetas */
@media (max-width: 768px){

    body{
        padding:10px;
        font-size:16px;
    }

    table{
        display:block;
        overflow-x:hidden;
    }

    tr{
        display:block;
        background:#2a2a2a;
        margin-bottom:10px;
        border-radius:10px;
        padding:10px;
    }

    td{
        display:block;
        border:none;
        padding:6px 0;
    }

    .info{
        display:block;
    }

    .leftInfo{
        display:flex;
        justify-content:space-between;
        flex-wrap:wrap;
        gap:6px;
    }

    .rightInfo{
        text-align:right;
        margin-top:8px;
    }

    .hpbar{
        width:100%;
        margin-top:6px;
    }

    .edit{
        font-size:16px;
        width:60px;
    }

    .deleteBtn{
        width:100%;
        margin-top:10px;
    }
}

</style>
</head>

<body>

<h1>⚔ Tracker de Combate</h1>

<div class="toolbar">

<button class="btn-pc" onclick="add('pc')">➕ PJ</button>
<button class="btn-npc" onclick="add('npc')">➕ NPC</button>
<button class="btn-enemy" onclick="add('enemy')">➕ Enemigo</button>

<button class="btn-next" onclick="nextTurn()">⏭ Turno</button>
<button class="btn-reset" onclick="resetAll()">🗑 Reset</button>
<button class="btn-ui" onclick="toggleBig()">🖥 Pantalla</button>

</div>

<div style="text-align:center">
Ronda:
<input id="round" type="number"
style="width:70px;text-align:center"
onchange="save()">
</div>

<table>
<thead>
<tr>
<th>Nombre</th>
<th>Info</th>
</tr>
</thead>

<tbody id="body"></tbody>
</table>

<script>

let data = JSON.parse(localStorage.getItem("it_data")) || [];
let activeId = localStorage.getItem("it_active") || null;

function save(){
    localStorage.setItem("it_data",JSON.stringify(data));
    localStorage.setItem("it_active",activeId);
    localStorage.setItem("it_round",document.getElementById("round").value);
}

function sorted(){
    return [...data].sort((a,b)=>b.init-a.init);
}

function render(){

    document.getElementById("round").value =
        localStorage.getItem("it_round") || 1;

    const body = document.getElementById("body");
    body.innerHTML = "";

    let list = sorted();

    for(let c of list){

        if(!c.conditions) c.conditions=[];

        body.innerHTML += `
<tr class="${c.type} ${c.id===activeId?'active':''}">
<td>
<input class="edit"
value="${c.name}"
onchange="edit('${c.id}','name',this.value)">
</td>

<td class="info">

<div class="leftInfo">

🛡 <input class="edit" style="width:40px"
value="${c.ac}"
onchange="edit('${c.id}','ac',this.value)">

❤️ <input class="edit" style="width:40px"
value="${c.hp}"
onchange="edit('${c.id}','hp',this.value)">

/ <input class="edit" style="width:40px"
value="${c.maxhp}"
onchange="edit('${c.id}','maxhp',this.value)">

<div class="hpbar">
<div class="hpfill"
style="width:${(c.hp/c.maxhp)*100}%"></div>
</div>

</div>

<div class="rightInfo">

🪽 <input class="edit" style="width:50px;text-align:right"
value="${c.init}"
onchange="edit('${c.id}','init',this.value)">

</div>

<button class="deleteBtn" onclick="del('${c.id}')">❌</button>

</td>
</tr>`;
    }

    save();
}

function add(type){

let name=prompt("Nombre:");
if(!name)return;

data.push({
id:crypto.randomUUID(),
type,
name,
init:+prompt("Iniciativa:",0),
ac:+prompt("CA:",10),
hp:+prompt("Vida:",10),
maxhp:+prompt("Max:",10),
conditions:[]
});

render();
}

function edit(id,f,v){
let c=data.find(x=>x.id===id);
c[f]=f==="name"?v:+v;
render();
}

function nextTurn(){

let list=sorted();
if(!list.length)return;

let i=list.findIndex(x=>x.id===activeId);
i++;

if(i>=list.length){
i=0;
document.getElementById("round").value++;
}

activeId=list[i].id;
render();
}

function del(id){
if(!confirm("Eliminar?"))return;
data=data.filter(x=>x.id!==id);
render();
}

function resetAll(){
if(!confirm("Borrar todo?"))return;
if(!confirm("Última confirmación"))return;
data=[];
activeId=null;
localStorage.clear();
render();
}

document.addEventListener("keydown",e=>{
if(e.code==="Space"){
e.preventDefault();
nextTurn();
}
});

render();

</script>

</body>
</html>
