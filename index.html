<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracker de Combate</title>

<style>

:root{
    --bg:#1b1b1b;
    --panel:#2a2a2a;
    --text:#fff;
    --gold:#d4af37;
}

body{
    margin:0;
    padding:20px;
    background:var(--bg);
    color:var(--text);
    font-family:Segoe UI, Arial, sans-serif;
    font-size:18px;
}

h1{text-align:center;}

.toolbar{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:10px;
}

button{
    border:none;
    padding:10px 14px;
    border-radius:8px;
    cursor:pointer;
}

.btn-pc{background:#234f8c;color:white;}
.btn-npc{background:#2f6f45;color:white;}
.btn-enemy{background:#8b2f2f;color:white;}
.btn-next{background:#1565c0;color:white;}
.btn-reset{background:#b71c1c;color:white;}

table{
    width:100%;
    border-collapse:collapse;
    background:#2a2a2a;
}

th{
    background:#111;
    padding:12px;
    text-align:left;
}

td{
    padding:10px;
    border-top:1px solid #444;
}

tr.dragging{
    opacity:0.5;
}

.pc{background:#234f8c;}
.npc{background:#2f6f45;}
.enemy{background:#8b2f2f;}

.active{
    outline:6px solid var(--gold);
    outline-offset:-3px;
    box-shadow:0 0 15px rgba(212,175,55,.8);
}

.edit{
    background:transparent;
    border:none;
    color:white;
    font-size:inherit;
    outline:none;
    text-align:center;
}

.info{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.leftInfo{
    display:flex;
    gap:10px;
    align-items:center;
    flex-wrap:wrap;
}

.rightInfo{
    margin-left:auto;
}

/* 🧲 HANDLE DRAG */
.handle{
    cursor:grab;
    padding:4px 8px;
    user-select:none;
    font-size:18px;
    opacity:0.7;
}

.handle:active{
    cursor:grabbing;
    opacity:1;
}

.deleteBtn{
    margin-left:10px;
    background:#b71c1c;
    color:white;
    border:none;
    padding:4px 8px;
    border-radius:6px;
    cursor:pointer;
}

.hpbar{
    height:6px;
    width:70px;
    background:#333;
    border-radius:4px;
    overflow:hidden;
}

.hpfill{
    height:100%;
    background:#3ddc6b;
}

</style>
</head>

<body>

<h1>⚔ Tracker de Combate</h1>

<div class="toolbar">

<button class="btn-pc" onclick="add('pc')">➕ PJ</button>
<button class="btn-npc" onclick="add('npc')">➕ NPC</button>
<button class="btn-enemy" onclick="add('enemy')">➕ Enemigo</button>

<button class="btn-next" onclick="nextTurn()">⏭ Turno</button>
<button class="btn-reset" onclick="resetAll()">🗑 Reset</button>

</div>

<div style="text-align:center">
Ronda:
<input id="round" type="number"
style="width:70px;text-align:center"
onchange="save()">
</div>

<table>
<thead>
<tr>
<th>Drag</th>
<th>Nombre</th>
<th>Info</th>
</tr>
</thead>

<tbody id="body"></tbody>
</table>

<script>

let data = JSON.parse(localStorage.getItem("it_data")) || [];
let activeId = localStorage.getItem("it_active") || null;

let dragId = null;

function save(){
    localStorage.setItem("it_data",JSON.stringify(data));
    localStorage.setItem("it_active",activeId);
    localStorage.setItem("it_round",document.getElementById("round").value);
}

function sorted(){
    return [...data].sort((a,b)=>b.init-a.init);
}

/* RENDER */
function render(){

    document.getElementById("round").value =
        localStorage.getItem("it_round") || 1;

    const body = document.getElementById("body");
    body.innerHTML = "";

    let list = sorted();

    for(let c of list){

        body.innerHTML += `
<tr class="${c.type} ${c.id===activeId?'active':''}"
data-id="${c.id}">

<td>
<div class="handle" draggable="true">⋮⋮</div>
</td>

<td>
<input class="edit"
value="${c.name}"
onchange="edit('${c.id}','name',this.value)">
</td>

<td class="info">

<div class="leftInfo">

🛡 <input class="edit" style="width:40px"
value="${c.ac||10}"
onchange="edit('${c.id}','ac',this.value)">

❤️ <input class="edit" style="width:40px"
value="${c.hp||10}"
onchange="edit('${c.id}','hp',this.value)">

/ <input class="edit" style="width:40px"
value="${c.maxhp||10}"
onchange="edit('${c.id}','maxhp',this.value)">

<div class="hpbar">
<div class="hpfill"
style="width:${((c.hp||0)/(c.maxhp||1))*100}%"></div>
</div>

</div>

<div class="rightInfo">

🪽 <input class="edit" style="width:50px;text-align:right"
value="${c.init||0}"
onchange="edit('${c.id}','init',this.value)">
</div>

<button class="deleteBtn"
onclick="del('${c.id}')">❌</button>

</td>
</tr>`;
    }

    addDragEvents();
    save();
}

/* EDIT */
function edit(id,f,v){
let c=data.find(x=>x.id===id);
c[f]=f==="name"?v:+v;
render();
}

/* ADD */
function add(type){

data.push({
id:crypto.randomUUID(),
type,
name:prompt("Nombre:"),
init:+prompt("Iniciativa:",0),
ac:+prompt("CA:",10),
hp:+prompt("Vida:",10),
maxhp:+prompt("Max:",10)
});

render();
}

/* TURN */
function nextTurn(){

let list=sorted();
if(!list.length)return;

let i=list.findIndex(x=>x.id===activeId);
i++;

if(i>=list.length){
i=0;
document.getElementById("round").value++;
}

activeId=list[i].id;
render();
}

/* DELETE */
function del(id){
if(!confirm("Eliminar?"))return;
data=data.filter(x=>x.id!==id);
render();
}

/* RESET */
function resetAll(){
if(!confirm("Borrar todo?"))return;
if(!confirm("Última confirmación"))return;
data=[];
activeId=null;
localStorage.clear();
render();
}

/* DRAG ONLY FROM HANDLE */
function addDragEvents(){

const handles=document.querySelectorAll(".handle");

handles.forEach(handle=>{

handle.addEventListener("dragstart",e=>{
dragId=handle.closest("tr").dataset.id;
handle.closest("tr").classList.add("dragging");
});

handle.addEventListener("dragend",e=>{
handle.closest("tr").classList.remove("dragging");
dragId=null;
save();
});

handle.addEventListener("dragover",e=>{
e.preventDefault();

const targetRow=handle.closest("tr");
const targetId=targetRow.dataset.id;

if(!dragId || dragId===targetId) return;

const fromIndex=data.findIndex(x=>x.id===dragId);
const toIndex=data.findIndex(x=>x.id===targetId);

const moved=data.splice(fromIndex,1)[0];
data.splice(toIndex,0,moved);

render();
});

});
}

render();

</script>

</body>
</html>
