<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracker de Combate</title>

<style>

:root{
    --bg:#1b1b1b;
    --panel:#2a2a2a;
    --text:#fff;
    --gold:#d4af37;
}

body{
    margin:0;
    padding:20px;
    background:var(--bg);
    color:var(--text);
    font-family:Segoe UI, Arial, sans-serif;
    font-size:18px;
}

h1{ text-align:center; }

.toolbar{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:10px;
}

button{
    border:none;
    padding:10px 14px;
    border-radius:8px;
    cursor:pointer;
}

.btn-pc{background:#234f8c;color:white;}
.btn-npc{background:#2f6f45;color:white;}
.btn-enemy{background:#8b2f2f;color:white;}
.btn-next{background:#1565c0;color:white;}
.btn-reset{background:#b71c1c;color:white;}

table{
    width:100%;
    border-collapse:collapse;
    background:var(--panel);
}

th{
    background:#111;
    padding:12px;
    text-align:left;
}

td{
    padding:10px;
    border-top:1px solid #444;
}

.pc{background:#234f8c;}
.npc{background:#2f6f45;}
.enemy{background:#8b2f2f;}

.active{
    outline:6px solid var(--gold);
    outline-offset:-3px;
    box-shadow:0 0 15px rgba(212,175,55,.8);
}

/* inputs */
.edit{
    background:transparent;
    border:none;
    color:white;
    font-size:inherit;
    outline:none;
    text-align:center;
}

/* layout */
.info{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
}

.leftInfo{
    display:flex;
    gap:10px;
    align-items:center;
    flex-wrap:wrap;
}

.rightInfo{
    margin-left:auto;
    font-weight:bold;
}

.hpbar{
    height:6px;
    width:70px;
    background:#333;
    border-radius:4px;
    overflow:hidden;
}

.hpfill{
    height:100%;
    background:#3ddc6b;
}

/* botones daño */
.hpControls{
    display:flex;
    gap:4px;
    align-items:center;
    margin-left:6px;
}

.hpBtn{
    width:26px;
    height:26px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
    color:white;
}

.hpMinus{ background:#b71c1c; }
.hpPlus{ background:#2e7d32; }

.deleteBtn{
    margin-left:10px;
    background:#b71c1c;
    color:white;
    border:none;
    padding:4px 8px;
    border-radius:6px;
    cursor:pointer;
}

/* muertos */
.dead{
    opacity:0.5;
    filter:grayscale(1);
}

/* condiciones */
.condBox{
    display:flex;
    flex-wrap:wrap;
    gap:4px;
    align-items:center;
    margin-left:6px;
}

.condTag{
    background:#555;
    padding:2px 6px;
    border-radius:6px;
    font-size:12px;
    cursor:pointer;
    user-select:none;
}

.condAddBtn{
    background:#444;
    border:none;
    color:white;
    padding:2px 6px;
    border-radius:6px;
    cursor:pointer;
    font-size:12px;
}

/* turno animación */
@keyframes turnFlash {
    0% { box-shadow:0 0 0 rgba(212,175,55,0); }
    50% { box-shadow:0 0 25px rgba(212,175,55,0.9); }
    100% { box-shadow:0 0 0 rgba(212,175,55,0); }
}

.turnFlash{
    animation: turnFlash 0.6s ease;
}

</style>
</head>

<body>

<h1>⚔ Combat Tracker </h1>

<div class="toolbar">

<button class="btn-pc" onclick="add('pc')">➕ PJ</button>
<button class="btn-npc" onclick="add('npc')">➕ NPC</button>
<button class="btn-enemy" onclick="add('enemy')">➕ Enemigo</button>

<button class="btn-next" onclick="nextTurn()">⏭ Turno</button>
<button class="btn-reset" onclick="resetAll()">🗑 Reset</button>

</div>

<div style="text-align:center">
Ronda:
<input id="round" type="number"
style="width:70px;text-align:center"
onchange="save()">
</div>

<table>
<thead>
<tr>
<th>Nombre</th>
<th>Info</th>
</tr>
</thead>

<tbody id="body"></tbody>
</table>

<script>

let data = JSON.parse(localStorage.getItem("it_data")) || [];
let activeId = localStorage.getItem("it_active") || null;

/* SAVE */
function save(){
    localStorage.setItem("it_data",JSON.stringify(data));
    localStorage.setItem("it_active",activeId);
    localStorage.setItem("it_round",document.getElementById("round").value);
}

/* SORT */
function sorted(){
    return [...data].sort((a,b)=>b.init-a.init);
}

/* RENDER */
function render(){

    document.getElementById("round").value =
        localStorage.getItem("it_round") || 1;

    const body = document.getElementById("body");
    body.innerHTML = "";

    let list = sorted();

    for(let c of list){

        let isDead = c.hp <= 0;

        body.innerHTML += `
<tr class="${c.type} ${c.id===activeId?'active':''} ${isDead?'dead':''}">
<td>
<input class="edit"
value="${c.name}"
onchange="edit('${c.id}','name',this.value)">
</td>

<td class="info">

<div class="leftInfo">

🛡 <input class="edit" style="width:40px"
value="${c.ac}"
onchange="edit('${c.id}','ac',this.value)">

❤️ <input class="edit" style="width:40px"
value="${c.hp}"
onchange="edit('${c.id}','hp',this.value)">

/ <input class="edit" style="width:40px"
value="${c.maxhp}"
onchange="edit('${c.id}','maxhp',this.value)">

${isDead ? "☠" : ""}

<div class="hpControls">

<button class="hpBtn hpMinus"
onclick="damage('${c.id}',-1)">-1</button>

<button class="hpBtn hpPlus"
onclick="damage('${c.id}',1)">+1</button>

</div>

<div class="hpbar">
<div class="hpfill"
style="width:${(c.hp/c.maxhp)*100}%"></div>
</div>

<!-- CONDICIONES -->
<div class="condBox">

${(c.conditions || []).map((cond, idx)=>`
    <span class="condTag"
    onclick="removeCond('${c.id}',${idx})">
        ${cond} ✖
    </span>
`).join("")}

<button class="condAddBtn"
onclick="addCond('${c.id}')">+ estado</button>

</div>

</div>

<div class="rightInfo">

🪽 <input class="edit"
style="width:50px;text-align:right"
value="${c.init}"
onchange="edit('${c.id}','init',this.value)}">

</div>

<button class="deleteBtn" onclick="del('${c.id}')">❌</button>

</td>
</tr>`;
    }

    save();
}

/* DAMAGE (PERMITE VIDA NEGATIVA) */
function damage(id,val){
    let c = data.find(x=>x.id===id);
    if(!c) return;

    c.hp += val;

    render();
}

/* CONDICIONES */
function addCond(id){
    let c = data.find(x=>x.id===id);
    if(!c) return;

    let cond = prompt("Condición en español:");
    if(!cond) return;

    if(!c.conditions) c.conditions = [];

    c.conditions.push(cond);

    render();
}

function removeCond(id,index){
    let c = data.find(x=>x.id===id);
    if(!c || !c.conditions) return;

    c.conditions.splice(index,1);

    render();
}

/* ADD */
function add(type){

let name=prompt("Nombre:");
if(!name)return;

data.push({
id:crypto.randomUUID(),
type,
name,
init:+prompt("Iniciativa:",0),
ac:+prompt("CA:",10),
hp:+prompt("Vida:",10),
maxhp:+prompt("Max:",10),
conditions:[]
});

render();
}

/* EDIT */
function edit(id,f,v){
let c=data.find(x=>x.id===id);
c[f]=f==="name"?v:+v;
render();
}

/* TURN */
function nextTurn(){

let list=sorted();
if(!list.length)return;

let i=list.findIndex(x=>x.id===activeId);
i++;

if(i>=list.length){
i=0;
document.getElementById("round").value++;
}

activeId=list[i].id;

/* animación */
setTimeout(()=>{
let row=document.querySelector("tr.active");
if(row){
row.classList.add("turnFlash");
setTimeout(()=>row.classList.remove("turnFlash"),600);
}
},10);

render();
}

/* DELETE */
function del(id){
if(!confirm("Eliminar?"))return;
data=data.filter(x=>x.id!==id);
render();
}

/* RESET */
function resetAll(){
if(!confirm("Borrar todo?"))return;
if(!confirm("Última confirmación"))return;
data=[];
activeId=null;
localStorage.clear();
render();
}

/* KEYBOARD */
document.addEventListener("keydown",e=>{
if(e.code==="Space"){
e.preventDefault();
nextTurn();
}
});

render();

</script>

</body>
</html>
